<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispositivos Inteligentes - MVC</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-microchip me-2"></i>Smart Devices MVC
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="admin.html">Admin</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contenido principal -->
    <div class="container mt-4">
        <h1 class="text-center mb-4">Catálogo de Dispositivos</h1>
        
        <!-- Filtros -->
        <div class="row mb-4">
            <div class="col-md-4">
                <input type="text" class="form-control" id="buscarInput" 
                       placeholder="Buscar por nombre...">
            </div>
            <div class="col-md-3">
                <select class="form-select" id="filtroTipo">
                    <option value="">Todos los tipos</option>
                </select>
            </div>
            <div class="col-md-3">
                <select class="form-select" id="filtroMarca">
                    <option value="">Todas las marcas</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100" id="btnBuscar">
                    <i class="fas fa-search"></i> Buscar
                </button>
            </div>
        </div>

        <!-- Lista de dispositivos -->
        <div id="lista-dispositivos" class="row">
            <!-- Se carga dinámicamente -->
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">Proyecto MVC - Dispositivos Inteligentes</p>
    </footer>

    <!-- Scripts en orden MVC -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- 1. Modelos -->
    <script src="js/models/dispositivo.model.js"></script>
    
    <!-- 2. Servicios -->
    <script src="js/services/api.service.js"></script>
    
    <!-- 3. Vistas -->
    <script src="js/views/dispositivo.view.js"></script>
    
    <!-- 4. Controlador (debe ir al final) -->
    <script src="js/controllers/dispositivo.controller.js"></script>
    
    <!-- 5. Inicialización -->
    <script>
        // Inicializar la aplicación cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', () => {
            DispositivoController.init();
        });
    </script>
</body>
</html>
